<!DOCTYPE html>
<html lang="ko" data-color-mode="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira</title>
  <link rel="preconnect" href="https://ds-cdn.prod-east.frontend.public.atl-paas.net" />
  <link rel="stylesheet" href="https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/font-rules/v6/atlassian-fonts.css" crossorigin />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="top-nav">
    <div class="nav-left">
      <button class="nav-btn" type="button" aria-label="사이드바">
        <span class="icon icon-16"><svg fill="none" viewBox="0 0 16 16" role="presentation" class="_1reo15vq _18m915vq _syaz1r31 _lcxvglyw _s7n4yfq0 _vc881r31 _1bsbpxbi _4t3ipxbi"><path fill="currentcolor" fill-rule="evenodd" d="M14 2.5a.5.5 0 0 1 .5.5v10a.5.5 0 0 1-.5.5h-2v-11zm-3.5 0v11H2a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5zM16 3a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zM8.03 7.47l-2.5-2.5-1.06 1.06L6.44 8 4.47 9.97l1.06 1.06 2.5-2.5a.75.75 0 0 0 0-1.06" clip-rule="evenodd"></path></svg></span>
      </button>
      <button class="nav-btn" type="button" aria-label="사이트 또는 앱 전환">
        <span class="icon icon-16"><svg><use href="icons.svg#icon-app-switcher"/></svg></span>
      </button>
      <a class="nav-logo" href="#">
        <svg class="icon icon-24" height="100%" viewBox="0 0 24 24">
          <path fill="var(--tile-color,#1868db)" d="M0 6a6 6 0 0 1 6-6h12a6 6 0 0 1 6 6v12a6 6 0 0 1-6 6H6a6 6 0 0 1-6-6z"></path>
          <path fill="var(--icon-color, white)" d="M9.051 15.434H7.734c-1.988 0-3.413-1.218-3.413-3h7.085c.367 0 .605.26.605.63v7.13c-1.772 0-2.96-1.435-2.96-3.434zm3.5-3.543h-1.318c-1.987 0-3.413-1.196-3.413-2.978h7.085c.367 0 .627.239.627.608v7.13c-1.772 0-2.981-1.435-2.981-3.434zm3.52-3.522h-1.317c-1.987 0-3.413-1.217-3.413-3h7.085c.367 0 .605.262.605.61v7.129c-1.771 0-2.96-1.435-2.96-3.434z"></path>
        </svg>
        <span class="nav-logo-text">Jira</span>
      </a>
    </div>

    <div class="nav-center">
      <div class="nav-search-wrap">
        <span class="icon icon-16 icon-subtle"><svg><use href="icons.svg#icon-search"/></svg></span>
        <input id="nav-search" class="nav-search" type="search" />
      </div>
      <button class="btn-primary" type="button">
        <span class="icon icon-16"><svg><use href="icons.svg#icon-add"/></svg></span>
        <span id="nav-create-label"></span>
      </button>
    </div>

    <div class="nav-right">
      <div class="nav-right-actions">
        <button class="btn-rovo" type="button">
          <span class="rovo-icon" aria-hidden="true"></span>
          <span id="nav-rovo-label"></span>
        </button>
      </div>
      <div class="nav-right-icons">
        <button class="nav-btn nav-btn--badge" type="button" aria-label="알림">
          <span class="icon icon-20"><svg><use href="icons.svg#icon-notification"/></svg></span>
          <span id="nav-notification-badge" class="nav-badge nav-badge--red" hidden></span>
        </button>
        <button class="nav-btn nav-btn--badge" type="button" aria-label="최근">
          <span class="icon icon-20"><svg><use href="icons.svg#icon-history"/></svg></span>
          <span id="nav-help-badge" class="nav-badge nav-badge--blue" hidden></span>
        </button>
        <button class="nav-btn" type="button" aria-label="설정">
          <span class="icon icon-20"><svg><use href="icons.svg#icon-settings"/></svg></span>
        </button>
        <span class="avatar avatar-sm avatar-orange">CD</span>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <div class="issue-page">
      <div class="issue-layout">
        <main id="issue-main" class="issue-main"></main>
        <aside id="issue-context" class="issue-context"></aside>
      </div>
    </div>
  </div>

  <button class="fab-help" type="button" aria-label="도움말">
    <span class="icon icon-20"><svg><use href="icons.svg#icon-question"/></svg></span>
  </button>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <div id="attachment-lightbox" class="attachment-lightbox" hidden>
    <button type="button" class="attachment-lightbox-backdrop" aria-label="닫기"></button>
    <figure class="attachment-lightbox-panel">
      <button type="button" class="attachment-lightbox-close" aria-label="닫기">×</button>
      <img id="attachment-lightbox-img" class="attachment-lightbox-img" alt="" />
      <figcaption id="attachment-lightbox-caption" class="attachment-lightbox-caption"></figcaption>
    </figure>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
